# E2E 集成测试专用 profile：连独立测试库 yanhuo_test + 真 Redis（6379）。
# @SpringBootTest 用 @ActiveProfiles("test") 激活；不跑 @Scheduled（task.scheduling 仅配置池大小）。
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # E2E 测试连腾讯云测试库（staging 对外端口 13306）
    url: jdbc:mysql://49.232.3.201:13306/yanhuo_test?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD:}
  data:
    redis:
      host: 49.232.3.201
      port: 16379
  task:
    scheduling:
      pool:
        size: 1

gudu:
  upload-dir: /tmp/gudu-test-uploads
  ai:
    provider: mock
