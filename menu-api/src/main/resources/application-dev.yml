spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.100.248:3306/gudu?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD:}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: GuduHikariCP

  data:
    redis:
      host: 192.168.100.248
      port: 6379
      database: 0
      timeout: 3000ms

gudu:
  ai:
    provider: ${YANHUO_AI_PROVIDER:deepseek}
    deepseek:
      base-url: https://api.deepseek.com/v1
      model: deepseek-chat
      key: ${API_KEY:}
