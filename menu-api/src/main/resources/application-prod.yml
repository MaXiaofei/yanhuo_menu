# 生产/容器部署：连 compose 内的 db 容器（service name）
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://gudu-mysql:3306/gudu?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD:}
    type: com.zaxxer.hikari.HikariDataSource
  data:
    redis:
      host: gudu-redis
      port: 6379

gudu:
  upload-dir: /app/uploads/prod
  ai:
    provider: ${GUDU_AI_PROVIDER:deepseek}
    deepseek:
      base-url: https://api.deepseek.com/v1
      model: deepseek-chat
      key: ${DEEPSEEK_API_KEY:${API_KEY:}}   # 兼容：优先 DEEPSEEK_API_KEY，回退 API_KEY
    glm:
      base-url: https://open.bigmodel.cn/api/paas/v4
      model: glm-4-plus
      key: ${GLM_API_KEY:}

# 日志：同时输出到控制台(docker logs) + 文件(/app/logs/)
logging:
  file:
    path: /app/logs
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
      file-name-pattern: ${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz
