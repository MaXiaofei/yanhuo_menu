# 咕嘟小食单 · 全栈一键部署（HTTPS）
# ============================================================
# 首次部署：
#   1. 替换 nginx/init-letsencrypt.sh 中的域名和邮箱
#   2. docker compose -f docker-compose.prod.yml up -d --build
#   3. ./nginx/init-letsencrypt.sh   （签发 HTTPS 证书）
# ============================================================
services:
  gudu-mysql:
    image: mysql:8.0
    container_name: gudu-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: gudu
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci", "--character-set-client-handshake=FALSE"]
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./menu-api/sql:/docker-entrypoint-initdb.d:ro

  gudu-redis:
    image: redis:7
    container_name: gudu-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"

  menu-api:
    build: ./menu-api
    container_name: menu-api
    restart: unless-stopped
    depends_on: [gudu-mysql, gudu-redis]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-${API_KEY:-}}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GUDU_AI_PROVIDER: ${GUDU_AI_PROVIDER:-deepseek}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - uploads:/app/uploads
      - ./logs:/app/logs

  menu-admin:
    build: ./menu-admin
    container_name: menu-admin
    restart: unless-stopped
    depends_on: [menu-api]
    # 不暴露端口到宿主机，由 front-nginx 统一代理

  front-nginx:
    image: nginx:alpine
    container_name: gudu-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - menu-admin

  certbot:
    image: certbot/certbot
    container_name: gudu-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c '
      trap exit TERM;
      while :; do
        certbot renew --quiet;
        echo "certbot renew checked at $$(date)";
        sleep 12h;
      done'
    depends_on:
      - front-nginx

volumes:
  mysql-data:
  uploads:
