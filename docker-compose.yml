# 咕嘟小食单 · 开发依赖（MySQL / Redis / MinIO）—— 独立开发库方案（当前未启用）
# ⚠️ 状态：此 compose 定义的 yanhuo-deps 已于 2026-06-27 删除（容器+数据）。
#    当前本地开发改连测试环境 gudu-deploy 的 MySQL/Redis（见 application-dev.yml）：
#      mysql  49.232.3.201:3306 (生产) / 49.232.3.201:13306 (测试/staging)
#      redis  49.232.3.201:6379 (生产) / 49.232.3.201:16379 (测试/staging)
#    如需重建独立开发库（不污染测试数据），在有 docker 的机器上跑此 compose 即可。
services:
  yanhuo-mysql:
    image: mysql:8.0
    container_name: yanhuo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-MYSQL_PWD_REDACTED}
      MYSQL_DATABASE: yanhuo
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "13306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql

  yanhuo-redis:
    image: redis:7
    container_name: yanhuo-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - ./data/redis:/data

  yanhuo-minio:
    image: minio/minio
    container_name: yanhuo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-MINIO_PWD_REDACTED}
    volumes:
      - ./data/minio:/data
